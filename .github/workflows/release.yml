name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-linux:
    # Built inside an old-glibc manylinux container (not bare ubuntu-latest)
    # so the binary runs on older distros too (research clusters, older
    # institutional Linux images), not just the newest Ubuntu. A binary
    # built directly on ubuntu-latest fails with a GLIBC version mismatch
    # on anything older — verified locally on Ubuntu 22.04/glibc 2.35.
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - name: Install git (not present in the container image)
        run: yum install -y git

      - uses: actions/checkout@v4

      - name: Locate a Python 3.x toolchain in the image
        run: |
          PYBIN="$(ls -d /opt/python/cp3*/bin | sort -V | tail -1)"
          echo "PYBIN=$PYBIN" >> "$GITHUB_ENV"
          "$PYBIN/python" --version

      - name: Install build tooling
        run: $PYBIN/pip install pyinstaller

      - name: Build standalone binary
        run: $PYBIN/pyinstaller --onefile --name safeda-aam --paths . packaging/pyinstaller_entry.py

      - name: Stage artifact
        run: |
          mkdir -p out
          cp dist/safeda-aam out/safeda-aam-linux-x64

      - uses: actions/upload-artifact@v4
        with:
          name: safeda-aam-linux-x64
          path: out/safeda-aam-linux-x64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install pyinstaller

      - name: Build standalone binary
        run: pyinstaller --onefile --name safeda-aam --paths . packaging/pyinstaller_entry.py

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          cp dist/safeda-aam.exe out/safeda-aam-windows-x64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: safeda-aam-windows-x64.exe
          path: out/safeda-aam-windows-x64.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts into one release directory
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
